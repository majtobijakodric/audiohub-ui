<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudioHub | Home</title>
</head>

<body>
  <main class="grid h-svh overflow-hidden bg-surface p-3 sm:p-4">
    <section class="relative grid h-full min-h-0 w-full grid-cols-[clamp(5.5rem,14vw,14rem)_minmax(0,1fr)] grid-rows-[auto_minmax(0,1fr)_4.5rem] gap-3 overflow-visible bg-surface p-0">
      <button class="absolute top-4 right-4 grid h-11 w-11 place-items-center bg-surface-container-highest text-on-surface transition duration-150 hover:bg-surface-dim focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-primary-fixed sm:top-6 sm:right-6" type="button" data-action="toggle-theme" aria-label="Toggle theme" title="Toggle theme">
      <span data-theme-icon aria-hidden="true"></span>
      </button>

        <section class="relative grid gap-3 rounded-panel bg-surface-container-highest p-3 outline outline-ghost -outline-offset-1 sm:p-4" style="grid-column: 1 / -1;">
          <form class="flex min-h-16 items-center gap-3 rounded-[1.5rem] bg-surface-container-low px-4 text-on-surface outline outline-ghost transition-colors duration-150 focus-within:outline-2 focus-within:outline-primary-fixed/45" data-form="search" novalidate>
            <span class="grid h-5 w-5 shrink-0 place-items-center text-on-surface-muted" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5"></circle>
                <path d="M16 16l4.5 4.5"></path>
              </svg>
            </span>
            <input
              class="min-w-0 flex-1 border-0 bg-transparent p-0 text-base text-on-surface outline-none placeholder:text-on-surface-muted/80"
              id="search-query" name="ytTitle" type="text" autocomplete="on"
              placeholder="What do you want to play?" aria-describedby="search-status" />
          </form>

          <p class="m-0 text-sm leading-[1.45] text-on-surface-muted" id="search-status"></p>

          <div class="absolute left-3 right-3 top-full z-20 mt-3 grid max-h-56 gap-2 overflow-y-auto rounded-panel bg-surface-container-highest p-2 outline outline-ghost -outline-offset-1" data-role="search-results" hidden></div>
        </section>

      <aside class="min-h-0 rounded-panel bg-surface-container-highest outline outline-ghost -outline-offset-1" aria-label="Sidebar" style="grid-column: 1; grid-row: 2;"></aside>

      <section class="grid min-h-0 grid-rows-[auto_minmax(0,1fr)] rounded-panel bg-surface-container-low p-3 outline outline-ghost -outline-offset-1" style="grid-column: 2; grid-row: 2;">
        <p class="m-0 text-[0.75rem] leading-none font-medium uppercase tracking-[0.08em] text-on-surface-muted">
          All songs
        </p>
        <div class="grid min-h-0 gap-2 overflow-y-auto pr-1" data-role="library"></div>
      </section>

      <footer class="rounded-panel bg-surface-container-highest outline outline-ghost -outline-offset-1" style="grid-column: 1 / -1; grid-row: 3;"></footer>
    </section>
  </main>

  <script type="module" src="../home.js"></script>
</body>

</html>
